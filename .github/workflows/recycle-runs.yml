name: "Recycle runs"

on:
  workflow_dispatch:
    inputs:
      workflow_names:
        description: 'Comma-separated list of workflow names to clean up'
        required: true
        default: 'Build App'
      days_to_keep:
        description: 'Number of days to keep runs (runs older than this will be deleted)'
        required: false
        default: '14'
      dry_run:
        description: 'Dry run mode (only show what would be deleted without actually deleting)'
        required: false
        default: 'true'
        type: boolean

permissions:
  actions: write
  contents: read

jobs:
  recycle-workflow-runs:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests python-dateutil

      - name: Run workflow cleanup
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          WORKFLOW_NAMES: ${{ github.event.inputs.workflow_names }}
          DAYS_TO_KEEP: ${{ github.event.inputs.days_to_keep }}
          DRY_RUN: ${{ github.event.inputs.dry_run }}
        run: |
          python .github/scripts/recycle-workflow-runs.py