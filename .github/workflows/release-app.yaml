name: Release App

permissions:
  contents: write

on:
  push:
    # Cannot filter on both branches (release) and tags - it's ORed
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'
      - 'v[0-9]+.[0-9]+.[0-9]+.[0-9]+'
      - 'v[0-9]+.[0-9]+.[0-9]+-rc\.[0-9]+'
      - 'v[0-9]+.[0-9]+.[0-9]+-rc\.[0-9]+\.[0-9]+'

jobs:
  release:
    name: Release Build and Publish
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true
          fetch-depth: 0

      - name: Ensure release branch
        run: |
          git config --global --add safe.directory '*'
          if ! git branch -a --contains $(git rev-parse HEAD) | grep release >/dev/null; then
            echo "Tag is not part of release branch - aborting..."
            exit 1
          fi

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Get Go version from Syncthing upstream
        id: get_go_version
        run: |
          set -eu
          GO_VERSION=$(grep -E '^\s*GO_VERSION:' syncthing/src/github.com/syncthing/syncthing/.github/workflows/build-syncthing.yaml | head -1 | cut -d '"' -f 2)
          echo "go_version=${GO_VERSION}" >> $GITHUB_OUTPUT
          echo "GO_VERSION=${GO_VERSION}" >> $GITHUB_ENV

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ steps.get_go_version.outputs.go_version }}
          check-latest: true
          cache: false

      - name: Install Android SDK
        run: |
          set -eu
          # Set environment variables
          echo "ANDROID_HOME=$HOME/android-sdk" >> $GITHUB_ENV
          echo "ANDROID_SDK_ROOT=$HOME/android-sdk" >> $GITHUB_ENV
          echo "$HOME/android-sdk/cmdline-tools/latest/bin" >> $GITHUB_PATH
          
          echo "Installing Android SDK from scratch"
          # Install Android command line tools
          SDK_TOOLS_VERSION="11076708"
          SDK_TOOLS_FILE="commandlinetools-linux-${SDK_TOOLS_VERSION}_latest.zip"
          
          mkdir -p $HOME/android-sdk/cmdline-tools
          cd $HOME/android-sdk/cmdline-tools
          
          wget -q "https://dl.google.com/android/repository/${SDK_TOOLS_FILE}"
          unzip -q "${SDK_TOOLS_FILE}"
          rm "${SDK_TOOLS_FILE}"
          
          # Move to expected location
          mv cmdline-tools latest
          
          # Accept Android licenses
          yes | $HOME/android-sdk/cmdline-tools/latest/bin/sdkmanager --licenses

      - name: Get app version from libs.versions.toml
        id: get_version
        run: |
          set -eu
          VERSION=$(grep 'version-name = ' gradle/libs.versions.toml | cut -d '"' -f 2)
          echo "VERSION=$VERSION" >> $GITHUB_ENV

      - name: Extract application ID from gradle config
        id: get_app_id
        run: |
          set -eu
          # Extract applicationId dynamically from app/build.gradle.kts using grep and cut
          APPLICATION_ID=$(grep "applicationId = " app/build.gradle.kts | cut -d '"' -f 2)
          
          echo "APPLICATION_ID=${APPLICATION_ID}" >> $GITHUB_ENV
          echo "Extracted application ID: ${APPLICATION_ID}"

      - name: build_release
        env:
          SYNCTHING_RELEASE_KEY_ALIAS: Syncthing-Fork
          SIGNING_PASSWORD: '${{ secrets.SIGNING_PASSWORD }}'
          SYNCTHING_RELEASE_STORE_FILE: '${{ runner.temp }}/signing-keystore.jks'
        shell: bash
        run: |
          set -eu
          echo '${{ secrets.SIGNING_KEYSTORE_JKS_BASE64 }}' | base64 -d > "$SYNCTHING_RELEASE_STORE_FILE"
          java -version
          ./gradlew --no-daemon buildNative lintRelease assembleRelease
          rm "$SYNCTHING_RELEASE_STORE_FILE"

      - name: build_per_abi_apks
        env:
          SYNCTHING_RELEASE_KEY_ALIAS: Syncthing-Fork
          SIGNING_PASSWORD: '${{ secrets.SIGNING_PASSWORD }}'
          SYNCTHING_RELEASE_STORE_FILE: '${{ runner.temp }}/signing-keystore.jks'
        shell: bash
        run: |
          set -eu
          echo '${{ secrets.SIGNING_KEYSTORE_JKS_BASE64 }}' | base64 -d > "$SYNCTHING_RELEASE_STORE_FILE"
          
          # Backup original build.gradle.kts
          cp app/build.gradle.kts app/build.gradle.kts.backup
          
          # List of ABIs to build individual APKs for
          ABIS=("armeabi-v7a" "arm64-v8a" "x86" "x86_64")
          
          for ABI in "${ABIS[@]}"; do
            echo "Building APK for ABI: $ABI"
            
            # Temporarily modify build.gradle.kts to include only this ABI
            # This sed pattern matches any include() line in the ABI splits section
            # and replaces it with just the current ABI. It's flexible with content inside include().
            if ! sed -i 's/include([^)]*)/include("'"$ABI"'")/' app/build.gradle.kts; then
              echo "Error: Failed to modify build.gradle.kts for ABI $ABI"
              echo "The ABI split configuration may have changed. Please update the sed pattern."
              exit 1
            fi
            
            # Verify the modification was successful
            if ! grep -q "include(\"$ABI\")" app/build.gradle.kts; then
              echo "Error: ABI modification verification failed for $ABI"
              echo "Expected to find: include(\"$ABI\")"
              echo "Current ABI configuration:"
              grep -A 5 -B 5 "include(" app/build.gradle.kts || true
              exit 1
            fi
            
            # Build APK for this ABI only
            ./gradlew --no-daemon assembleRelease
            
            # Rename the output APK to include ABI suffix
            mv "app/build/outputs/apk/release/app-release.apk" "app/build/outputs/apk/release/${{ env.APPLICATION_ID }}_${ABI}_v${{ env.VERSION }}.apk"
            
            # Restore original build.gradle.kts for next iteration
            cp app/build.gradle.kts.backup app/build.gradle.kts
          done
          
          # Clean up backup file and keystore
          rm app/build.gradle.kts.backup
          rm "$SYNCTHING_RELEASE_STORE_FILE"

      - name: prepare-artifacts
        shell: bash
        run: |
          set -eu
          #
          # Rename universal APK to include "universal" in the name
          mv "app/build/outputs/apk/release/app-release.apk" "app/build/outputs/apk/release/${{ env.APPLICATION_ID }}_universal_v${{ env.VERSION }}.apk"
          #
          # Generate SHA256 checksums for all APKs
          cd "app/build/outputs/apk/release"
          echo '${{ secrets.GNUPG_SIGNING_KEY_BASE64 }}' | base64 -d | gpg --import
          
          # Create checksums for all APK files
          for apk in *.apk; do
            if [[ -f "$apk" ]]; then
              echo "Creating checksum for $apk"
              sha256sum "$apk" >> sha256sum.txt
            fi
          done
          
          # Sign the checksums file
          gpg --clearsign sha256sum.txt

      - uses: ncipollo/release-action@v1
        with:
          artifacts: "app/build/outputs/apk/release/*.apk,app/build/outputs/apk/release/*.asc"
          artifactErrorsFailBuild: true
          name: Syncthing-Fork v${{ env.VERSION }}
          bodyFile: "app/src/main/play/release-notes/en-US/default.txt"
          prerelease: ${{ contains('-rc.', github.ref_name) }}
          draft: true
